<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Monitor de Telemetria Digital</title>
<link rel = "stylesheet" href = "style.css">
</head>

<body>
<div class = "dados_vel"><h1>Dados do Velocímetro</h1><br></div>
<div class="velocidade">Velocidade: <span id="velocidade">0</span> km/h</div>
<div class="rpm">RPM: <span id="rpm">0</span></div>

<!--FECTCH-->
<script>
function atualizarDados() {
fetch('buscar_ultimo.php') //atencao
.then(response => response.json())
.then(data => {
// Certifique-se de que as propriedades do objeto 'data' condizem com o JSON da API.
document.getElementById('rpm').innerText = data.rpm;
document.getElementById('velocidade').innerText = data.velocidade;
})
.catch(error => console.log("Falha na requisição dos dados:",
error));
}

atualizarDados();
setInterval(atualizarDados, 1000);
</script>
</body>
</html>
